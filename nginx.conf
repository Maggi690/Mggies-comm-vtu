server {
    listen 80;
    listen [::]:80;
    server_name api.universalvtupro.com;

    # Force HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.universalvtupro.com;
    root /var/www/universal-vtu-pro/public;
    index index.php;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/api.universalvtupro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.universalvtupro.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options            "SAMEORIGIN"            always;
    add_header X-Content-Type-Options     "nosniff"               always;
    add_header X-XSS-Protection           "1; mode=block"         always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy            "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none';" always;

    # Gzip
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1024;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=webhooks:10m rate=120r/m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        limit_req zone=api burst=20 nodelay;
    }

    location ~ ^/api/auth/ {
        try_files $uri $uri/ /index.php?$query_string;
        limit_req zone=auth burst=5 nodelay;
    }

    location ~ ^/api/webhooks/ {
        try_files $uri $uri/ /index.php?$query_string;
        limit_req zone=webhooks burst=30 nodelay;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 120;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Block access to sensitive files
    location ~* \.(env|log|conf|sql|bak)$ {
        deny all;
    }

    client_max_body_size 10M;

    access_log /var/log/nginx/uvtp-access.log;
    error_log  /var/log/nginx/uvtp-error.log;
}
